# =============================================================================
# Daytona Local — docker-compose.local.yaml
# =============================================================================
# Project:   daytona-learner77-fork
# Env file:  docker/.env  (loaded automatically or via --env-file docker/.env)
#
# Port range: 12000–12650 (50-port intervals)
# WSL2 IP:    192.168.16.153  (set in docker/.env)
#
# Shared infra services used (from shared-infra network):
#   postgres-shared:5432   redis-shared:6379      minio-shared:9000
#   maildev-shared:1025    dex-shared:5556         otel-collector-shared:4318
#   registry-shared:5000
#
# Start shared infra first:
#   bash shared-infra/start-shared-infra.sh
#
# Then start Daytona:
#   bash build-and-run.sh
# =============================================================================

name: daytona-learner77-fork

services:

  # ---------------------------------------------------------------------------
  # API — Daytona main backend
  # External: 12000 | Internal: 3500
  # URL: http://192.168.16.153:12000
  # Dashboard: http://192.168.16.153:12000/dashboard
  # Joins shared-infra to reach postgres, redis, minio, dex, otel, maildev
  # ---------------------------------------------------------------------------
  api:
    image: daytona-api:local-latest
    restart: always
    privileged: true
    ports:
      - 12000:3500
    environment:
      # Core
      - NODE_ENV=production
      - PORT=3500
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ENCRYPTION_SALT=${ENCRYPTION_SALT}
      - ENVIRONMENT=docker-compose
      - HEALTH_CHECK_API_KEY=${HEALTH_CHECK_API_KEY}
      - DEFAULT_SNAPSHOT=daytonaio/sandbox:0.5.0-slim
      - LOG_REQUESTS_ENABLED=true
      # Database — postgres-shared on shared-infra
      - DB_HOST=postgres-shared
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
      - RUN_MIGRATIONS=true
      # Redis — redis-shared on shared-infra
      - REDIS_HOST=redis-shared
      - REDIS_PORT=6379
      # S3 / MinIO — minio-shared on shared-infra
      - S3_ENDPOINT=http://minio-shared:9000
      - S3_STS_ENDPOINT=http://minio-shared:9000/minio/v1/assume-role
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_DEFAULT_BUCKET=daytona
      - S3_ACCOUNT_ID=/
      - S3_ROLE_NAME=/
      # SMTP — maildev-shared on shared-infra
      - SMTP_HOST=maildev-shared
      - SMTP_PORT=1025
      - SMTP_EMAIL_FROM=${SMTP_EMAIL_FROM}
      - SMTP_USER=
      - SMTP_PASSWORD=
      - SMTP_SECURE=
      # OIDC / Dex — dex-shared on shared-infra
      - OIDC_CLIENT_ID=daytona
      - OIDC_AUDIENCE=daytona
      - OIDC_ISSUER_BASE_URL=http://dex-shared:5556/dex
      - PUBLIC_OIDC_DOMAIN=${PUBLIC_OIDC_DOMAIN}
      - OIDC_MANAGEMENT_API_ENABLED=
      - OIDC_MANAGEMENT_API_CLIENT_ID=
      - OIDC_MANAGEMENT_API_CLIENT_SECRET=
      - OIDC_MANAGEMENT_API_AUDIENCE=
      # Registry — registry-shared on shared-infra
      - TRANSIENT_REGISTRY_URL=http://registry-shared:5000
      - TRANSIENT_REGISTRY_ADMIN=admin
      - TRANSIENT_REGISTRY_PASSWORD=password
      - TRANSIENT_REGISTRY_PROJECT_ID=daytona
      - INTERNAL_REGISTRY_URL=http://registry-shared:5000
      - INTERNAL_REGISTRY_ADMIN=admin
      - INTERNAL_REGISTRY_PASSWORD=password
      - INTERNAL_REGISTRY_PROJECT_ID=daytona
      # OTel — otel-collector-shared on shared-infra
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector-shared:4318
      - OTEL_COLLECTOR_API_KEY=otel_collector_api_key
      # Proxy
      - PROXY_DOMAIN=proxy.localhost:12050
      - PROXY_PROTOCOL=http
      - PROXY_API_KEY=${PROXY_API_KEY}
      - PROXY_TEMPLATE_URL=http://{{PORT}}-{{sandboxId}}.proxy.localhost:12050
      # Dashboard
      - DASHBOARD_URL=${DASHBOARD_URL}
      - DASHBOARD_BASE_API_URL=${DASHBOARD_BASE_API_URL}
      # Runner defaults
      - DEFAULT_RUNNER_DOMAIN=runner:3003
      - DEFAULT_RUNNER_API_URL=http://runner:3003
      - DEFAULT_RUNNER_PROXY_URL=http://runner:3003
      - DEFAULT_RUNNER_API_KEY=${RUNNER_API_KEY}
      - DEFAULT_RUNNER_CPU=4
      - DEFAULT_RUNNER_MEMORY=8
      - DEFAULT_RUNNER_DISK=50
      - DEFAULT_RUNNER_NAME=default
      - DEFAULT_REGION_ID=us
      - DEFAULT_REGION_NAME=us
      - DEFAULT_REGION_ENFORCE_QUOTAS=false
      # Org quotas
      - DEFAULT_ORG_QUOTA_TOTAL_CPU_QUOTA=10000
      - DEFAULT_ORG_QUOTA_TOTAL_MEMORY_QUOTA=10000
      - DEFAULT_ORG_QUOTA_TOTAL_DISK_QUOTA=100000
      - DEFAULT_ORG_QUOTA_MAX_CPU_PER_SANDBOX=100
      - DEFAULT_ORG_QUOTA_MAX_MEMORY_PER_SANDBOX=100
      - DEFAULT_ORG_QUOTA_MAX_DISK_PER_SANDBOX=1000
      - DEFAULT_ORG_QUOTA_SNAPSHOT_QUOTA=1000
      - DEFAULT_ORG_QUOTA_MAX_SNAPSHOT_SIZE=1000
      - DEFAULT_ORG_QUOTA_VOLUME_QUOTA=10000
      # SSH Gateway
      - SSH_GATEWAY_API_KEY=${SSH_GATEWAY_API_KEY}
      - SSH_GATEWAY_URL=${SSH_GATEWAY_URL}
      - SSH_GATEWAY_COMMAND=${SSH_GATEWAY_COMMAND}
      - SSH_GATEWAY_PUBLIC_
      # Misc
      - POSTHOG_API_KEY=phc_bYtEsdMDrNLydXPD4tufkBrHKgfO2zbycM30LOowYNv
      - POSTHOG_HOST=https://d18ag4dodbta3l.cloudfront.net
      - POSTHOG_ENVIRONMENT=local
      - MAX_AUTO_ARCHIVE_INTERVAL=43200
      - MAINTENANCE_MODE=false
      - SKIP_USER_EMAIL_VERIFICATION=true
      - RUNNER_DECLARATIVE_BUILD_SCORE_THRESHOLD=10
      - RUNNER_AVAILABILITY_SCORE_THRESHOLD=10
      - RUNNER_START_SCORE_THRESHOLD=3
    networks:
      - daytona-network
      - shared-infra      # reaches postgres, redis, minio, dex, otel, maildev
    depends_on:
      - proxy
      - runner

  # ---------------------------------------------------------------------------
  # Proxy — Daytona reverse proxy for sandbox previews
  # External: 12050 | Internal: 4000
  # URL: http://192.168.16.153:12050
  # ---------------------------------------------------------------------------
  proxy:
    image: daytona-proxy:local-latest
    restart: always
    ports:
      - 12050:4000
    environment:
      - PROXY_PORT=4000
      - PROXY_API_KEY=${PROXY_API_KEY}
      - PROXY_PROTOCOL=http
      - DAYTONA_API_URL=http://api:3500/api
      - REDIS_HOST=redis-shared
      - REDIS_PORT=6379
      - OIDC_CLIENT_ID=daytona
      - OIDC_CLIENT_SECRET=
      - OIDC_DOMAIN=http://dex-shared:5556/dex
      - OIDC_PUBLIC_DOMAIN=${PUBLIC_OIDC_DOMAIN}
      - OIDC_AUDIENCE=daytona
      - TOOLBOX_ONLY_MODE=false
      - PREVIEW_WARNING_ENABLED=false
    networks:
      - daytona-network
      - shared-infra      # reaches redis-shared, dex-shared

  # ---------------------------------------------------------------------------
  # Runner — Daytona sandbox runner
  # External: 12100 | Internal: 3003
  # URL: http://192.168.16.153:12100
  # Joins shared-infra to reach minio and otel-collector
  # ---------------------------------------------------------------------------
  runner:
    image: daytona-runner:local-latest
    restart: always
    privileged: true
    ports:
      - 12100:3003
    volumes:
      - ./runner-daemon.json:/etc/docker/daemon.json:ro
    environment:
      - ENVIRONMENT=development
      - API_PORT=3003
      - DAYTONA_RUNNER_TOKEN=${RUNNER_API_KEY}
      - DAYTONA_API_URL=http://api:3500/api
      - RUNNER_DOMAIN=runner
      - LOG_FILE_PATH=/home/daytona/runner/runner.log
      - RESOURCE_LIMITS_DISABLED=true
      - SSH_GATEWAY_ENABLE=true
      - INTER_SANDBOX_NETWORK_ENABLED=false
      - AWS_ENDPOINT_URL=http://minio-shared:9000
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${S3_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${S3_SECRET_KEY}
      - AWS_DEFAULT_BUCKET=daytona
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector-shared:4318
      - SSH_PUBLIC_
    networks:
      - daytona-network
      - shared-infra      # reaches minio-shared, otel-collector-shared

  # ---------------------------------------------------------------------------
  # SSH Gateway — Daytona SSH access to sandboxes
  # External: 12150 | Internal: 2222
  # Connect: ssh -p 12150 <token>@192.168.16.153
  # ---------------------------------------------------------------------------
  ssh-gateway:
    image: daytona-ssh-gateway:local-latest
    restart: always
    ports:
      - 12150:2222
    environment:
      - API_URL=http://api:3500/api
      - API_KEY=${SSH_GATEWAY_API_KEY}
      - SSH_GATEWAY_PORT=${SSH_GATEWAY_PORT}
      - SSH_GATEWAY_URL=${SSH_GATEWAY_URL}
      - SSH_PRIVATE_
      - SSH_HOST_
    networks:
      - daytona-network

# =============================================================================
# Networks
# =============================================================================
networks:
  daytona-network:
    name: daytona-network   # internal service-to-service communication
  shared-infra:
    external: true          # pre-existing shared infrastructure network
